services:
  # ─── Web App (Next.js 15) ─────────────────────────────────────────────────
  - type: web
    name: agentic-notion-web
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm@9.15.0 && pnpm install --frozen-lockfile && pnpm --filter @zeta/db run db:generate && pnpm --filter @zeta/db run build && pnpm --filter @zeta/shared run build && pnpm --filter @zeta/types run build && pnpm --filter @zeta/web run build
    startCommand: cd apps/web && pnpm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: zeta-caid-db
          property: connectionString
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: MCP_AUTH_TOKEN
        sync: false
      - key: NEXT_PUBLIC_MCP_SERVER_URL
        sync: false
      - key: AGENT_API_TOKEN
        sync: false
      - key: NEXT_PUBLIC_AGENT_API_URL
        sync: false
      - key: APP_URL
        sync: false

  # ─── MCP Server ───────────────────────────────────────────────────────────
  - type: web
    name: agentic-notion-mcp
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm@9.15.0 && pnpm install --frozen-lockfile && pnpm --filter @zeta/db run db:generate && pnpm --filter @zeta/db run db:push && pnpm --filter @zeta/db run build && pnpm --filter @zeta/shared run build && pnpm --filter @zeta/types run build && pnpm --filter @zeta/mcp-server run build
    startCommand: cd apps/mcp-server && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: zeta-caid-db
          property: connectionString
      - key: MCP_AUTH_TOKEN
        sync: false
      - key: MCP_TRANSPORT
        value: http

  # ─── Agent API (LangGraph) ────────────────────────────────────────────────
  - type: web
    name: agentic-notion-agents
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm@9.15.0 && pnpm install --frozen-lockfile && pnpm --filter @zeta/db run db:generate && pnpm --filter @zeta/db run build && pnpm --filter @zeta/shared run build && pnpm --filter @zeta/types run build && pnpm --filter @zeta/agent-api run build
    startCommand: cd apps/agent-api && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3002"
      - key: DATABASE_URL
        fromDatabase:
          name: zeta-caid-db
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: MCP_SERVER_URL
        sync: false
      - key: MCP_AUTH_TOKEN
        sync: false
      - key: AGENT_API_TOKEN
        sync: false
      - key: APP_URL
        sync: false

databases:
  - name: zeta-caid-db
    databaseName: zeta_caid
    user: zeta_caid_user
    region: oregon
    plan: free
